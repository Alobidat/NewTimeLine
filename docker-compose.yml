# Local / dev backing services for Chronos (NewTimeLine).
# Phase 0: stands up the data layer. App services (api, agents, admin) are added in
# later phases. Usage: copy .env.example -> .env, then `docker compose up -d`.
# Verify Phase 0 done: all services report healthy (`docker compose ps`).

name: chronos

# Shared connection env for the app services (uses the same secrets as the backing
# services above; service names resolve on the compose network).
x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_URL: redis://redis:6379/0
  AMQP_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY: ${MINIO_ROOT_USER}
  S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  ENVIRONMENT: dev
  # Social-login client secrets (ADR-0026). Kept out of git — set in the host .env; a provider
  # is only offered when its secret here AND its client_id (Config Service) are present.
  AUTH_GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET:-}
  AUTH_APPLE_CLIENT_SECRET: ${AUTH_APPLE_CLIENT_SECRET:-}
  AUTH_FACEBOOK_CLIENT_SECRET: ${AUTH_FACEBOOK_CLIENT_SECRET:-}
  AUTH_TWITTER_CLIENT_SECRET: ${AUTH_TWITTER_CLIENT_SECRET:-}

services:
  postgres:
    # Custom image = PostGIS + pgvector (see infra/compose/postgres/Dockerfile).
    build: ./infra/compose/postgres
    image: chronos/postgres-postgis-pgvector:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Init scripts run once on first boot (enable extensions).
      - ./infra/compose/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"        # AMQP
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"  # management UI
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"      # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  # --- Application services (Phase 1) ---

  migrate:
    # One-shot: applies Alembic migrations, then exits. Other app services wait for it.
    build:
      context: .
      dockerfile: db/Dockerfile
    image: chronos/migrate:0.1
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: chronos/api:0.1
    environment: *app-env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Read-only Docker socket so the admin log-tail endpoint can stream container stdout.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 15s
      timeout: 5s
      retries: 5

  agents:
    # Runs a single agent command then exits (ingest-rss by default). Invoke on demand:
    #   docker compose run --rm agents seed-wikidata --limit 300
    #   docker compose run --rm agents ingest-rss
    build:
      context: .
      dockerfile: services/agents/Dockerfile
    image: chronos/agents:0.1
    environment: *app-env
    # Lets the default LLM config reach an Ollama running on the Docker host via
    # http://host.docker.internal:11434 (configure llm.providers for any other host).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"

  worker:
    # Long-running queue consumer: drains admin run-now / search-collect jobs AND runs the
    # AI-user scheduler tick on an interval (the bots' heartbeat — posts + interactions).
    build:
      context: .
      dockerfile: services/agents/Dockerfile
    image: chronos/agents:0.1
    command: ["worker"]
    environment: *app-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Health monitor: read per-container resource stats via the Docker Engine API (read-only
      # socket → list/stats are GETs). Host root (ro) gives host-accurate disk/mem/cpu figures.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  webapp:
    # Serves the pre-built Flutter web bundle (built on a dev machine and copied to
    # ./webdist on the host — Flutter isn't installed on the LXC). Static files only.
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./webdist:/usr/share/nginx/html:ro
      # Serve the SPA + reverse-proxy /api → the api service (same-origin; no hardcoded API IP).
      - ./infra/webapp/default.conf:/etc/nginx/conf.d/default.conf:ro

  adminapp:
    # Serves the pre-built Admin Portal Flutter web bundle (./webdist-admin). Same nginx config
    # as webapp: SPA + same-origin /api proxy to the api service. The Admin API is currently
    # open in dev (no admin_token) — set ADMIN_TOKEN + rebuild the bundle to lock it down.
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${ADMIN_WEB_PORT:-8081}:80"
    volumes:
      - ./webdist-admin:/usr/share/nginx/html:ro
      - ./infra/webapp/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  miniodata:
