# nginx config for the Flutter web bundle + a same-origin API reverse proxy.
#
# The web app calls the API at the relative path `/api` (see apps/mobile/lib/config.dart), and
# this server forwards `/api/*` to the `api` service over the Docker compose network. Serving
# the API same-origin means the browser only ever needs to reach :8080 — no hardcoded API LAN
# IP (which breaks over tunnels / cross-host), and no CORS.
server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Clip uploads (POST /api/upload) can be large; default nginx caps bodies at 1m. Keep this
    # in step with the backend `upload.max_bytes` (200 MB default).
    client_max_body_size 256m;

    # Dev: never let the browser cache the app shell, so a redeploy is picked up on reload
    # (the Flutter PWA service worker is also disabled at build time — --pwa-strategy=none).
    add_header Cache-Control "no-store" always;

    # Same-origin API proxy → the api service (compose DNS name `api`).
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # The API issues a few absolute-path redirects (e.g. media thumb → /media/{id}/raw).
        # Rewrite their Location back under /api so the browser stays on the proxied path.
        # Absolute (http://…) redirects to external sources are left untouched.
        proxy_redirect / /api/;

        # SSE (/api/search/stream) + general streaming: don't buffer, hold the connection open.
        proxy_buffering off;
        proxy_cache     off;
        proxy_read_timeout 3600s;
    }

    # Flutter web SPA: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
