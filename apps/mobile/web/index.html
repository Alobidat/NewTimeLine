<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="chronos_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>chronos_app</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* Black document backdrop, BELOW the Flutter view + the feed's <video> platform view.
       The feed Scaffold is transparent so the clip shows; this keeps non-video areas black. */
    html, body { margin: 0; padding: 0; background-color: #000; }
    /* The feed clip is the only platform view and is purely decorative (muted autoplay, no
       controls). Its host element (flt-platform-view) otherwise sits ABOVE Flutter's glass
       pane and captures every pointer/touch in the centre, so the vertical feed can't be
       swiped. Make the host ignore input so gestures fall through to Flutter. */
    flt-platform-view { pointer-events: none !important; }
    /* Hand ALL touch gestures to Flutter: without touch-action:none the browser claims a
       vertical touch-drag as a pan/scroll and never forwards the moves, so the feed can't be
       swiped up/down on a touch screen. */
    flutter-view, flt-glass-pane { touch-action: none !important; }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
