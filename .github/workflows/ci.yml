# CI gate. Grows with the codebase: Phase 0 validates config + hygiene; language jobs
# (Python ruff/pytest, Flutter analyze/test) are added as those apps land.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hygiene:
    name: Pre-commit hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  compose:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Provide env for interpolation
        run: cp .env.example .env
      - name: Validate compose config
        run: docker compose config -q

  python:
    name: Python lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install packages
        run: |
          pip install -e packages/core[dev]
          pip install -e services/api[dev] -e services/agents[dev]
      - name: Lint
        run: ruff check packages services db/migrations
      - name: Unit tests (pure domain + normalizers; no DB needed)
        run: pytest packages/core/tests services/agents/tests -q

  flutter:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
